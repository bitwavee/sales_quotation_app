name: sales_quotation_app
description: "Field Sales & Quotation Management App - Flutter Mobile Application"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  cupertino_icons: ^1.0.2
  
  # State Management
  provider: ^6.0.0
  
  # Networking
  http: ^1.1.0
  dio: ^5.3.1
  
  # Local Storage
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  path: ^1.8.3
  
  # UI & Design
  flutter_svg: ^2.0.7
  intl: ^0.19.0
  cached_network_image: ^3.3.0
  
  # PDF
  pdf: ^3.10.0
  printing: ^5.11.0
  
  # Image & Camera
  image_picker: ^1.0.4
  camera: ^0.10.5+5
  
  # Validation
  form_validator: ^2.1.1
  
  # Navigation
  go_router: ^13.0.0
  
  # Utilities
  uuid: ^4.0.0
  get_it: ^7.6.0
  connectivity_plus: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/